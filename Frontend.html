<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-outer: #000000;
            --bg-card: #292936;
            --text-white: #ffffff;
            --text-dim: #e0e0e0;
        }

        body {
            background-color: var(--bg-outer);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- ปรับคอนเทนเนอร์ให้กว้าง 80% ของหน้าจอ (80vw) --- */
        .card-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* บังคับให้มี 3 คอลัมน์ */
            width: 90vw; /* กว้าง 80% ของ Viewport Width */
            gap: 30px;
        }

        /* รองรับหน้าจอขนาดเล็ก (มือถือ/แท็บเล็ต) ให้เหลือคอลัมน์เดียวหรือสองคอลัมน์ */
        @media (max-width: 1200px) {
            .card-container {
                grid-template-columns: repeat(2, 1fr);
                width: 90vw; /* เพิ่มความกว้างบนจอเล็กเพื่อไม่ให้บีบเกินไป */
            }
        }
        @media (max-width: 768px) {
            .card-container {
                grid-template-columns: 1fr;
            }
        }

        /* --- สไตล์ของ Card ขยายเต็มคอลัมน์ --- */
        .script-card {
            background-color: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            width: 100%; /* ขยาย 100% ตาม Grid Column */
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .script-card h3 {
            text-align: center;
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
        }

        .script-card .role {
            font-size: 15px;
            color: var(--text-white);
            margin-bottom: 5px;
        }

        .media-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border-radius: 15px;
            overflow: hidden; /* ซ่อนส่วนที่ล้นออกไป */
            
            /* ใช้ Flexbox ในการดึง iframe ให้จัดกึ่งกลางแนวตั้งและแนวนอนเสมอ */
            display: flex;
            align-items: center; 
            justify-content: center;
        }

        .media-container iframe {
            width: 100%;
            /* เพิ่มความสูงของ iframe เข้าไปตรงๆ ชดเชยแถบ Google Drive บน-ล่าง */
            /* ปกติแถบบนและล่างรวมกันจะประมาณ 100px - 120px */
            height: calc(100% + 120px); 
            
            border: none;
        }
        .desc-list {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
        }

        .desc-list li {
            position: relative;
            padding-left: 20px;
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 6px;
        }

        .desc-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--text-white);
        }
    </style>
</head>
<body>

    <div class="card-container" id="card-container"></div>

    <script>
        const Data = {
            "Inventory Script": {
                role: "Role: UX/UI Design and Frontend Developer",
                desc: "  ㆍ Configured inventory logic and items.\n    ㆍ Developed backend logic using Lua.\n    ㆍ Created custom UI styles.",
                link: "https://drive.google.com/file/d/1OTYGAL9BWDB_DteqHIF1n7DhhwnG5USU/preview"
            },            
            "Health Bar Script": {
                role: "Role: UI Design and Frontend Developer",
                desc: "  ㆍ UI Design via GIMP and Photo Scape X\n    ㆍ Frontend Development via HTML and CSS.\n    ㆍ Backend Development via JavaScript and Lua.",
                link: "https://drive.google.com/file/d/1jePbh5uTPKEriH2hw8aV4F4r57nWclDX/preview"
            },
            "Scoreboard Script": {
                role: "Role: UI Design and Frontend Developer",
                desc: "  ㆍ UI Design via GIMP and Photo Scape X\n    ㆍ Frontend Development via HTML and CSS.\n    ㆍ Backend Development via JavaScript and Lua.",
                link: "https://drive.google.com/file/d/1uXggk8D-YcpjNH_hGxE3IkhbMTxj4KNE/preview"
            },

            "MLBB Tier List": {
                role: "Role: UX/UI Design and Frontend Developer",
                desc: "  ㆍ UI Design via Fixma\n    ㆍ Frontend Development via HTML and CSS.\n    ㆍ Backend Development via JavaScript.",
                link: "https://drive.google.com/file/d/18tm7h3laZVocaHOlUsce3VbZCeURWGW0/preview"
            },            
            "MLBB Stream Frame": {
                role: "Role: UI Design and Frontend Developer",
                desc: "  ㆍ UI Design via Fixma, GIMP and Photo Scape X\n    ㆍ Frontend Development via HTML and CSS.\n    ㆍ Backend Development via JavaScript.",
                link: "https://drive.google.com/file/d/10QskOHE4T5tLYcAzVVdHT9ForDSSJ5I5/preview"
            },
            "Game21": {
                role: "Role: UI Design and Frontend Developer",
                desc: "  ㆍ UX/UI Design via Fixma\n    ㆍ Frontend Development via HTML and CSS.\n    ㆍ Backend Development via JavaScript.",
                link: "https://drive.google.com/file/d/1eDm3lNDMTAoo6i71hIxgOJHGGlZ41BYe/preview"
            }
        };

        const container = document.getElementById('card-container');

        for (const [title, info] of Object.entries(Data)) {
            const descItems = info.desc.split(/[ㆍ\n]+/).map(item => item.trim()).filter(item => item.length > 0);
            const listHTML = descItems.map(item => `<li>${item}</li>`).join('');

            const cardHTML = `
                <div class="script-card">
                    <h3>${title}</h3>
                    <div class="role">${info.role}</div>
                    <div class="media-container">
                        <iframe src="${info.link}" allow="autoplay" allowfullscreen></iframe>
                    </div>
                    <ul class="desc-list">
                        ${listHTML}
                    </ul>
                </div>
            `;
            
            container.innerHTML += cardHTML;
        }
    </script>
</body>
</html>
